services:
  backend:
    build: .
    container_name: autosnab_backend_mvp4
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      SECRETS_ENV_FILE: /app/.env
      UPLOADED_INVOICES_DIR: /app/uploads/invoices
    volumes:
      # OAuth callback обновляет access/refresh token непосредственно в .env.
      - ./.env:/app/.env
      - ./backend/uploads:/app/uploads
