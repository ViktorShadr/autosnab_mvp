services:
  backend:
    build: .
    container_name: autosnab_backend_mvp4
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ${BACKEND_ENV_FILE:-.env}
    environment:
      SECRETS_ENV_FILE: /app/.env
      DATABASE_URL: sqlite:////data/autosnab_mvp.db
      UPLOADED_INVOICES_DIR: /app/uploads/invoices
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ${BACKEND_ENV_FILE:-./.env}:/app/.env
      - autosnab_data:/data
      - autosnab_uploads:/app/uploads
      - autosnab_exports:/app/exports
      - autosnab_hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health/runtime', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ngrok:
    image: ngrok/ngrok:latest
    container_name: autosnab_backend_ngrok
    restart: unless-stopped
    profiles:
      - public-tunnel
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    command:
      - http
      - http://backend:8000
    ports:
      - "4040:4040"

volumes:
  autosnab_data:
  autosnab_uploads:
  autosnab_exports:
  autosnab_hf_cache:

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1376
